          ["Graphe", "Designação das ações processuais civis de natureza ampla, difusa ou pública e que por isso abarcava a permissão democrática especial de que seu processamento pudesse ser demandado por qualquer cidadão habilitado atuando de forma voluntária em nome do interesse tutelado em proteção dos bens da cidade como um todo coletivo."],

          ["Lei de Gortina", "Considerado um dos mais longos textos contínuos inscritos da antiguidade europeia, formava um enorme bloco nas paredes rurais preservado contendo preceitos sobre heranças escravos doações prevendo avançadíssimo benefício com diretos plenos femininos onde as posses herdadas ou de bens próprios das mulheres ficavam juridicamente a salvo do marido no matrimônio e também inalienáveis após ocorrências formais dos divórcios."],

          ["Nomothetai", "Colegiado especial judiciário reunido como um crivo superior formados unicamente pelos painéis compostos pela sociedade eleita oriundos dos tribunais maiores convocados em ritos não ordinários a atuar soberanamente julgando as propostas de mérito da adequação constitucional procedendo revisões profundas e votações que revogassem em definitivo substituindo velhos costumes processuais por inovações e modernidades nas regras estatutárias nas vigências nas repúblicas da polis clássica alterando definitivamente leis vitais."],
          ["Liturgia", "Sistema engenhoso obrigacional e fiscal não indireto imputado pelo aparelho da administração aos estratos mais ricos do corpo civil onerando solidariamente os aristocratas compulsoriamente os induzindo custear e materializar financiamentos diretos nas atividades necessárias dos entretenimentos cerimoniais atléticos no Estado promovendo de seu próprio tesouro particular o brilho e bem estar coletivos nas festas ou expedições que se lhes outorgavam a missão pela cidade honrada socialmente em caso dos empenhos serem notórios ao sucesso comunitário nas províncias urbanas anuais na época da fundação do calendário festivo burocrático em honra as virtudes pátrias e divinas promovendo paz ou mobilização dos concidadãos aos teatros das arenas e aos banquetes da comunidade nas ruas e ágoras."],
          ["Coregia", "Variante compulsória fiscal onde se tributava o munícipe afortunado designando encargo que requeria sua tutela material obrigando a providenciar sustentos financeiros a arcar com os custos não raros astronômicos no treinamento contratação de roupas músicos adereços e alimentação especial destinada aos artistas de um contingente inteiro responsável e ensaiado nas tragédias encenadas anualmente nos grandes concursos honrando nos altares o teatro nacional como encargo tributário individual voltado à cultura nos espetáculos obrigatórios do povo com finalidade legal e ritual religiosa."],
          ["Trierarquia", "Imposição pesadíssima fiscal que tributava o cidadão mais posses exigindo que assumisse pessoalmente a função com dispêndios particulares anuais equipando contratando tripulações peritas armando mantendo consertos materiais mantimentos comandando estrategicamente em prontidão e com aptidão combativa náutica o fornecimento e reparação custeando de forma plena de uma das embarcações navais de propulsão rápida de combates dos contingentes da esquadra garantindo belicamente o aparelho nacional frente à marinha externa alheia da cidade defendendo assim sem usar do erário comum o flanco de todos perante inimigos na guerra como obrigação estrita jurídica perante as magistraturas."],
          ["Prostates", "Figura central protetiva onde a legislação restringia processualmente estrangeiros que lhes forçavam contratarem e se fiarem civilmente elegendo um concidadão residente e nascido titular legal da terra e nas assembleias que ficasse formalmente responsável se posicionando fisicamente prestando fiança pagando eventuais multas patronando legal e processualmente nos pórticos judiciais todos e qualquer imigrante nas esferas oficiais sendo obrigatória esta representação em todos atos judiciais sob os magistrados sem a qual os imigrados padeciam na inépcia jurídica processual total e nas execuções penais no mundo cívico sendo indispensável na intermediação burocrática e processual diária em trâmites cíveis no governo."],
          ["Enktesis", "Decisão de rara natureza que concedia pela maioria absoluta votos assembleares a extrema benevolência outorgando direitos de privilégio de caráter excepcional e irrevogável perante ao estatuto jurídico precário conferindo as garantias imobiliárias em terras e autorizações permitindo um migrante residente notório pelo patriotismo comprovado ter autorizações especiais na aquisição e posse dos ativos de moradas telhados propriedades da terra na jurisdição pátria contornando assim a severidade e rígida tradição consuetudinária reservando patrimônios exclusivos das habitações somente aos clãs ou às linhagens da filiação cívica plena herdadas de nativos e filhos consanguíneos atenienses originais para moradias habituais."],
          ["Oikos", "Unidade base imobiliária fundiária orgânica familiar da antiguidade englobando como ente dotado de perenidade inviolável as paredes as terras o patrimônio total seus descendentes livres tutelados agregados dependentes as tumbas aos escravos sendo núcleo principal ao redor ao qual todas leis antigas protegiam de rupturas desapropriações focando a justiça ininterrupta em perpetuar economicamente e repassar verticalmente suas divisões da propriedade hereditária evitando o fatiamento absoluto da fazenda na descendência mantendo o pilar fundamental perante a organização estrutural cívica tributária militar de toda polis inteira coesa economicamente em sua existência milenar territorial perante assembleia na constituição."],
          ["Kurios", "Tutela legal na função guardiã paterna dominadora central obrigatória pelo ordenamento patriarcal onde uma figura masculina livre sã na responsabilidade exercida quer esposo o pai o irmão adulto o filho agia oficialmente processando nas lides representando como patrono civil irrevogável de pleno direito absoluto perante as cortes nas transações comercias e nos contratos dotais regendo em absoluto todas as movimentações e testamentos envolvendo as ações de todas as partes do genêro na dependência do círculo familiar sem a presença da qual o ato civil da prole seria eivado das nulidades perante o tribunal e à justiça no cotidiano."],

          ["Partilha Igualitária Patrimonial", "Diretriz estrita testamentária sem as exclusões de sexos comuns da antiguidade onde filhos e primogênitas fracionavam estritamente idênticas das proporções equitativas das cotas dos móveis das propriedades sem submissões ao varão sendo as filhas co herdeiras em graus inatacáveis provendo na família igualdades notórias atestadas nas petições cartorárias nos litígios dos reinos em favor feminino dos diretos plenos aos bens imobiliários na divisão da terra e bens deixados nas mortes e inventários no seio das famílias e clãs perante as decisões justas e equânimes da ordem civil e sucessões nos reinos originais da era faraônica sem privilégios sexuais masculinos nos direitos da herança com paridade nos tribunais do estado nas praças em todos os recantos geográficos no rito final das vidas da comunidade civil da era antiga clássica sob leis sábias com garantias nas justiças estaduais no período antigo"],
          ["Tropa Medjay Judiciária Policial", "Corpo ostensivo paramilitar constituído por nações nômades assimiladas encarregado nas rondas das metrópoles de prender torturar interrogar investigar proteger fronteiras necrópoles dos saqueadores operando com braços do judiciário para aplicar intimações manter vigilâncias e efetuar flagrantes por ordem do palácio dos magistrados a realeza central punindo crimes nas regiões e vales imperiais na proteção da paz e sentenças sob decreto judicial em toda a nação de épocas remotas da civilização imperial e monárquica do passado na polícia ostensiva dos reinados faraônicos clássicos no policiamento do mundo da época antiga em apoio as sentenças judiciais nas capitais e tumbas da época imperial sem desvios do dever da coroa do estado no tribunal em que a lei emanava e era aplicada pelos oficiais das areias na função de ordem nas cortes locais da antiguidade"],
          ["Supremo Conselho Aristocrático", "Assembleia restrita das altas esferas composta do palácio chamada trindade das dezenas os trinta figurando a nata burocrática da nação selecionada dos príncipes orientando juízes e elaborando diretrizes nacionais prestando total assessoramento as cortes vizir judicando as causas monumentais das cidades de Estado das eras imperiais da história no cume do sistema hierárquico das leis divinas estatais do governo perante todo país antigo em apelações de última instância dos tribunais com sentenças para casos gravíssimos regionais na coroa da antiguidade e nos reinados remotos do norte geográfico nas leis da era clássica e absolutismo puro dos magistrados máximos do passado na organização jurídica suprema do povo da nação milenar do rei com leis de peso definitivo na balança"],
          ["Distritos Judiciais e Fiscais", "A organização territorial de jurisdição perfeita da civilização com quarenta províncias administrativas onde todo imposto inquérito tribunais demarcações eram agrupados de forma autônoma submissas à coroa padronizando a administração e os recolhimentos nas fronteiras para unificação das sentenças e tribunais regionais da burocracia perfeita sob os domínios do monarca absoluto nas terras milenares antigas em todas suas possessões mapeadas e controladas com rigor da ordem das divisões civis na era das dinastias divinas nos reinos em épocas de grandes domínios com o comando unificado da monarquia dos milênios em suas esferas de prefeituras distritais perante as justiças em ação e tribunais das cortes regionais no mapa político da terra dos rios"],
          ["Governadores Magistrados", "Gestores e prefeitos locais dotados do poder máximo em suas comarcas não só nas questões da exação dos impostos estaduais mas operando o tribunal na comarca julgando as causas civis presidindo inquirições executando os decretos reis nos limites de seus territórios de forma descentralizada para evitar anarquia mas sempre sob controle dos olhos divinos da metrópole das nações no governo na província da terra com poderes administrativos absolutos nas varas e recolhimentos da safra no estado submisso as ordens superiores e vizires com poder executivo e judiciário nas cidades espalhadas na nação inteira nos reinados da glória do monarca absolutista em eras das conquistas imperiais e manutenção da pax interna nas comunidades do país com as justiças na alçada dos líderes locais no governo pátrio nas aldeias civilizadas sob controle central"],
          ["Expurgo Negativo Ordalha de Veredicto", "Princípio doutrinário teológico de auto absolvição enumerada no código funeral religioso contendo negativas peremptórias não matei não furtei não conspirei utilizadas como o passaporte processual moral perante o juízo dos deuses absolvendo de responsabilidades terrenas garantindo o veredicto perante as entidades pós mortes num modelo de direito espiritual inalienável das lendas das condutas sociais pátrias exigidas para vida das almas como guia moral jurídico da população da era sagrada na humanidade dos impérios da areia no julgamento final das cortes e para absolvição da vida sob o peso de leis da religião estatal nas morais da nação faraônica em preceitos obrigatórios morais civis da vida antiga com justiça severa nas doutrinas e pregações templárias nas religiões dominantes e rituais no além após existência na carne na era mítica das leis eternas nas civilizações e tradições com justiça perfeita"],
          ["Desterro Penoso Penal", "Pena corporal forçada infligida alternativamente as execuções despachando sonegadores prisioneiros traidores e subornados a marchar nas piores prisões a céu aberto nas pedreiras escaldantes ou para minas escuras sem retorno ou nas oásis desérticos com exaustão laboral mortal em favor do estado enriquecendo coroa através punição civil sob chicotes prestando dívida final carcerária para infrações pesadas de estado como expiação no tribunal militar das sentenças implacáveis do vizir em casos das leis corrompidas no império da glória passada nas colônias sob vigilância de tropas da justiça penal extrema dos domínios da monarquia de ferro em eras distantes sem absolvição nas sentenças definitivas carcerárias com pena perpétua de castigos aos criminosos banidos perante as nações regionais dominadas em campos forçados das províncias extremas na era antiga com punição máxima alternativa as mortes e fogueiras em julgamentos oficiais nas arenas distantes da coroa e palácio no tribunal central das eras"],
          ["Tributação Científica Agrícola", "Método genial estatal isonômico atrelando a régua dos impostos na exata medida em que enchentes anuais irrigavam solo nos poços marcadores definindo as safras garantindo assim ausência extorsões nos devedores em secas isentando províncias punindo em farturas equilibrando o recolhimento com as benesses divinas sazonais nos tribunais agrícolas para cálculo perfeito contábil na administração da fazenda perante a terra inundada anualmente e seus deuses da fertilidade em época certa para justiça tributária perfeita com a régua do tesouro e escribas do palácio e das justiças na região com tributos em grãos recolhidos pelo governo na dinastia sem o esmagamento camponês desmedido nas eras prósperas com tributações inteligentes das cheias regulares nos leitos rurais sem disputas litígios sob as varas fazendárias no estado em leis naturais harmônicas do cosmos e do rio milagroso da civilização central sob comando absoluto no reino da história antiga com cálculos e medidores nos sistemas"],
          ["Privilégio Feudal Religioso", "Decretação oficial das prerrogativas concedidas para proibir os soldados e fiscais recrutar qualquer monge clérigos das grandes fundações isentando nas construções rurais corveias públicas ou impostos garantindo total asilo econômico e poder autônomo e fomento as religiões como um poder em paralelo das cortes na magistratura intocável do tesouro do império protegido pelas maldições em lousas nas eras sagradas protegendo clero nas funções templárias do país das leis intocáveis e sagradas da dinastia da nação com ordens de divindades do monarca nas concessões de terras e propriedades nas épocas imperiais com poder estatal descentralizado em castas divinas para justiças na terra sem exações militares da força executiva na era clássica da religião de estado nas nações das civilizações nos templos imensos das pedras erguidas sob proteção de estado antigo com decretos divinos reais de justiças inalienáveis na lei vigente das eras do rei sagrado do passado da planície nos séculos antigos"],
          ["Punições Extremas a Infratores Ecológicos", "Lei punitiva rigorosa com viés de tabu onde exterminar maltratar ou sacrificar deliberadamente um animal sagrado patrono de deuses seja vacas felinos touros resultaria instantaneamente em processos capitais linchamentos retaliações divinas punitivas inafiançáveis nas praças sem defesa cabível com base em ofensas diretas a divindade pátria nas nações com rituais totêmicos absolutos no estado com a lei aplicada pela plebe revoltada sob vista grossa do juiz regional e da coroa divina na época das punições sumárias de infração por heresia ambiental nas eras arcaicas com leis severas sem remissão das culpas mortais e tabus sagrados intocáveis no mundo antigo sem recursos na justiça perante o crime e blasfêmia fatal nos templos e deuses protetores do local sagrado das urbes e vilas submissas a autoridade e religião de estado e ritos e punições capitais irremediáveis na história"],
          ["Padrões Percentuais Cambiais Mercantis", "Regulamentação bancária elementar mercantil baseada em escrituras para fixações exatas legais proibindo agiotagens extorsivas demarcando os exatos acréscimos das permutas no fornecimento das sementes sopesando garantias da prata sem inovações destrutivas com as multas perante faltas contratuais controlando as inflações de forma consuetudinária perante fiadores testemunhais nas audiências rurais nos foros de litígio comercial e contratos no império antigo e justiça das trocas e compras no estado sem moedas cunhadas inicialmente perante as nações mercantis e comércios no mar vermelho e rios das regiões da época gloriosa de comércio na paz do faraó supremo das negociações nos tempos com acordos judiciários rurais sem explorações ilimitadas da riqueza das províncias da nação dos impostos pátrios no sistema econômico em expansão nos anos e períodos clássicos do passado do governo das nações sem papéis moeda oficiais apenas por peso atestado de prata e balança das feiras com registros jurídicos contratuais de pagamento com multa no cartório"],
          ["Alienabilidade das Cadeiras Divinas", "Transações inusitadas legais provando avanços onde os próprios cargos litúrgicos hereditários posições nas santidades e templos viravam mercadoria negociadas como ativo repassados hereditários por herança alienados como franquias com faturamentos e aluguéis em cartórios legalizados garantindo renda as famílias detentoras dos monopólios religiosos secundários atestados nas instâncias sem ofensas das castas dominantes na capital do império pátrio na era ptolomaica e em períodos liberais das finanças estatais antigas em escrituras oficiais de cartórios com bens incorpóreos das rendas perante as burocracias sob selo real nas negociações imobiliárias em capitais antigas com lucros das doações estatais em leilões formais na sociedade mercadológica e livre concorrência nos fóruns antigos das províncias menores nos séculos passados sob a justiça do império em transações livres na praça comercial garantindo lucro de prestígio sem apropriações estatais das fontes e cargos eclesiásticos da época"],
          ["Incexto Régio Protegido", "Doutrina e foro exclusivo de privilégio da casta imperial monárquica onde o matrimônio intrafamiliar irmãos era lícito louvado necessário garantindo o sangue puro sucessório inquestionável as divindades perante a sociedade contrariando a proibição penal comum aos civis blindando a linhagem contra pretendentes não pátrios para domínios heranças da realeza suprema divina protegendo a dinastia no trono com lei absolutista sem reprovação e imune aos preceitos morais perante deuses ou leis no estado absoluto na coroa antiga perante tradições patriarcais em sociedades do mundo mitológico sem paralelos e proibições em tribunais das províncias com imunidade dos filhos sagrados dos deuses nos comandos imperiais nos palácios da coroa reinante dos monumentos sob os cultos absolutos e tradições imortais de deuses reinantes com plenos direitos na vida e herança faraônica sem disputas judiciais nas eras passadas das civilizações no governo de reis e deusas do país sagrado na humanidade"],
          ["Núpcias e Heranças Populares", "Costume e lei consuetudinária pacífica nas províncias não de castas ditando e impondo uniões com paridade sem poligamias explícitas no mesmo núcleo habitacional garantindo o foco familiar na linhagem da propriedade a filhos legítimos principais embora não incriminando coabitações periféricas sem direitos patrimoniais integrais com concubinatos em prol e estabilidade da oikos da comunidade sob os juízes em testamentos das posses no direito comum camponês no reino sob os preceitos pátrios das tradições diárias nas varas de assentamentos sem poligamias oficiosas garantindo assim sem diluições totais nas posses do cidadão nas capitais provinciais e disputas e demandas das esposas consortes em tribunais nos assentamentos rurais em processos julgados nas áreas comuns e praças centrais em audiência com anciões com resoluções simples sem dolo nos trâmites civis rústicos no período ancestral em regras da comunidade e respeito filial sem as desavenças do concubinato nas resoluções da era remota de casais no antigo reino com respeito no foro e sentenças e testemunhos nos documentos"],
          ["Garantias na Alienação de Cativos", "Cláusula protetiva comercial rígida e essencial chancelada para assegurar o ressarcimento da transação caso a escravidão ou o servo transacionado possuísse defeitos viciosos pretéritos moléstias graves ignoradas e especialmente perigos nas evasoẽs e tentames em fugir garantindo ao cobrador reembolsos em tribunais caso o contrato se desviasse por mentiras provadas nas cortes de pequenas causas do estado comercial mercante protegendo as transações mobiliárias de compras e perdas rurais na economia de mercadorias no mundo ancestral perante justiças cíveis nos escrivães oficiais sem dolo dos contratantes com garantias de uso contínuo das mercadorias sem rebeliões nas compras em dinheiro prata perante os feudos das famílias e compras nos leilões mercantis nas províncias estatais da planície sob leis imperativas econômicas e ressarcimento total em prata pelas perdas com devoluções perante mercadores e intermediadores sem questionamentos do vizir nos inquéritos justificados na antiguidade civil com multas de valor dobrado nos documentos dos pátios de comércio na via mercantil com atestações das trocas na antiguidade"],
          ["Recrutamento Básico Civil Laboral", "Regulamento impositivo de prestação temporária para utilidade pátria obrigando sem remunerações monetárias todos camponeses nocios nas safras das inundações participarem de monumentos erguimentos de represas valas obras públicas a serviço da coroa como tributo braçal servil perante corveia com sentenças e prisões aos desertores submetendo por direito a plebe nas ordens imperiais a edificar sob pena nas construções de deuses da coroa absolutista sem negociações sindicais na era dos impérios e governos com chicote no comando e escribas nas anotações de presenças diárias obrigatórias com as rações fornecidas sob a alçada da lei e administração pátria do império nos confins desertos ou capitais de domínio imperial absolutista no passado glorioso e sofrido nos canteiros da eternidade e pirâmides com punições corporais por abandonos laborais não chancelados no rito sumário dos tribunais regionais nas praças da dinastia para camponeses na obrigatoriedade anual civil da época prestando o serviço cívico dos reinados ao monarca no trono"],
          ["Tributação da Bebida Estatal", "Exigência monopolística governamental severa de arrecadação proibindo evasoẽs nas manufaturas locais com taxas compulsórias recaindo na fabricação popular de pães líquidos inebriantes diários base de nutrição garantindo os celeiros do palácio repletos sob a lei para remunerações exércitos sacerdotes sem as falhas nas safras tributadas de cevada nas administrações locais fiscalizadas pelos agentes estatais das prefeituras rurais com punições ou execuções sumárias por sonegações volumosas no contrabando de insumos essenciais perante justiças das varas financeiras na pátria antiga e seus impostos nas rotas rurais da economia em expansão e planejamento imperial perante os tribunais regionais das capitais com controle sobre monopólios rurais na história antiga mercantil em milênios da dinastia governante e seus conselheiros oficiais para a segurança financeira do governo absolutista"],
          ["Doutrina Humanitária Real", "Preceito dogmático imperativo que consagrava na propaganda legal que as leis e vizires exerciam proteção máxima acolhendo ser pai do desolado amparo as órfãs defesa suprema sem custas aos fracos sem padrinhos opondo-se teórica aos ricos perversos como juramento solene ao trono garantindo favor judicial da equidade na corte protegendo desamparados como a virtude final cobrada por deuses do monarca supremo perante as audiências públicas provando misericórdia na justiça dos inquéritos das capitais com compaixão e clemência do governante benevolente das nações submissas e suas justiças nas praças de clamores dos desamparados da vida cruel nas tribos e regiões afastadas do mundo real com socorro imediato com sentenças perante o clamor as cortes de clemência do rei magnânimo nas eras passadas da civilização que primava pela caridade em documentos sob selo monárquico no país da humanidade na era de tradições"],
          ["Isolamento Inquisitório Prévio", "Uso rotineiro e processual garantido nos ritos onde antes que provas pudessem periclitar depoimentos contaminar mandados autorizavam reclusão forçada dos denunciados no xadrez dos complexos divinos em isolamento perante inquéritos de vizires para coleta das evidências e sentenças não permitindo evasões aos desertores ou fugas durante processos penais gravíssimos do estado em casos ruidosos contra o patrimônio supremo no país nos casos policiais das justiças e interrogatórios das cortes das nações de tempos longínquos assegurando flagrantes e o cumprimento dos prazos processuais e mortes em confissões perante as salas de suplício com os réus aguardando execuções provisórias e ordens nas tumbas sem imunidades perante as varas das investigações estatais em porões do passado na organização de defesa criminal da justiça no seu tempo de controle repressivo nas sociedades"],
          ["Instrução Probatória Dolorosa", "Legalidade sistemática da violência procedimental instruindo torturas rotineiras atestadas papiro por papiro com espancamentos nas hastes duplas supliciando pulsos torsões não letais como etapa lícita de praxe do magistrado de arrancar as ocultações tesouros confessões aos prisioneiros perante julgamentos pátrios por furtos ou subversão aos palácios sendo oficializada sem clemências nas arenas e varas das cortes com os carcereiros reais aplicando inquéritos coercitivos brutais com sentenças atestadas por notários e registradas nas declarações judiciais na antiguidade repressiva sem complacências constitucionais do estado perante quadrilhas desbaratadas nos casos notórios de saques e profanações de sepulturas com punição institucional no terror oficial em inquéritos policiais sem proteção a integridade nas justiças estritas do país milenar nas masmorras das vilas sem misericórdia nas varas de interrogatório final"],
          ["Indulto e Remissão Festiva", "Mecanismo diplomático processual absolutista concedendo benevolência perdoando em épocas jubilares soltando condenados não capitais extinguindo débitos de sangue nas efemérides dos ciclos reais na elevação dos reinos atestando generosidade aliviando as superlotações restaurando concórdia nos ritos das nações das margens unidas pacificando descontentamentos no tecido civil através de libertação perante as praças dos templos como a graça imperativa da bondade pátria superior cancelando as penas impostas do pretérito criminal de multidões nas correntes e submetidos perante as graças do governante em jubileus festivos nas áreas da civilização garantindo devoção popular sem o derramamento inútil de sangue e a submissão carcerária eterna na misericórdia oficial da autoridade maior nas anistias do país em momentos singulares na história legal de governo absoluto perante os ritos da coroa festiva da humanidade antiga do norte no vale florido"]

          ["Awilum", "A cúpula da elite cidadã: a classe jurídica hierárquica superior de homens livres e plenos, cujas propriedades, vidas e orgulho possuíam os maiores direitos, mas curiosamente que também recebiam e aplicavam para seus pares as penas corporais violentas mais dolorosas da retribuição espelhada atestando status social igual no revide."],
          ["Mushkenum", "A grande massa trabalhadora submissa: o estatuto jurídico amplo intermediário e flexível dos dependentes do palácio, servos agregados e semi-livres rurais ou das ruas, que não possuíam privilégios altos mas que tinham em seu favor, ao invés da retribuição bárbara, compensações puramente financeiras atenuadas como penas em casos concretos."],
          ["Wardum", "Estatuto legal jurídico singular da escravidão comercial ou de guerra na antiguidade dotado curiosamente da característica civil tolerante de permitir expressamente na lei que o escravo acumulasse suas próprias fatias de riquezas mobiliárias, tivesse pequenos negócios lucrativos independentes e pudesse casar impunemente com pessoas integralmente livres do império sem perder suas posses no matrimônio forçado e misto das linhagens antigas."],
          ["Ensi / Patesi", "O título místico supremo originário do líder e administrador burocrático, do governante máximo encarnando na pessoa o venerável rei-sacerdote ungido, considerado legalmente em todos os processos criminais e civis apenas como legislador terreno transitório, pois era tido legalmente e sem discussão como mero administrador submisso das grandes e ricas fazendas sagradas pertencentes a deuses imortais padroeiros da terra sem poder reverter as leis impostas pelos tribunais dos deuses maiores e leis pétreas incontestáveis."],
          ["Tirhatu", "O contrato essencial impositivo e prévio de 'preço da noiva e noivado garantido', um depósito ou pagamento nupcial vultoso patrimonial obrigatório essencial aos nubentes em forma de garantias para oficializar perante cartórios e noivas a compra, transferência e o casamento vinculativo pleno com as filhas herdeiras protegendo no enlace arranjado as expectativas contra eventuais repúdios ou recusas dos genitores desonestos."],
          ["Adoção Fictícia Imobiliária", "Estratagema e ficção jurídica ardilosa de grande frequência no meio agrário cartorário, idealizada e utilizada ostensivamente nos registros legais das vendas dissimuladas, criada pelos tabeliões de província exclusivamente para driblar a fúria das proibições inarredáveis da tradição e as leis duras religiosas que não autorizavam, sem punições de sangue as famílias tradicionais vender terras das heranças inalienáveis, convertendo artificialmente o investidor como sendo adotado legalmente nas cortes."],
          ["Talião para Falso Testemunho", "Preceito gravíssimo do código de penas estabelecendo regra implacável e amedrontadora da lei que condenava e executava imediatamente a própria testemunha mentirosa exatamente com a mesmíssima dor corpórea gravíssima que o denunciado inocente viria inevitavelmente a sofrer nas prisões, caso os fatos provados no fórum desmentissem nos autos e apurações sem apelações a perfídia do caluniador flagrado durante inquéritos nas cidades muradas."],
          ["Repúdio e Devolução de Dote Conjugal", "A permissividade patriarcal legal extrema assegurando um amplo direito irrestrito sumário sem defesas das cortes permitindo divórcios, abandonos e desfazimentos marciais rápidos nas assembleias sob mera palavra, condicionado rigorosamente de fato a obrigação e peso financeiro irrevogável por parte do requerente a dever desembolsar e devolver com pesadas indenizações e remessas totais aos cofres antigos e à desposada, todo capital ou quantia fiduciária que recebera nas núpcias das praças na juventude, garantindo sustento das famílias rechaçadas na lei das comunidades camponesas ou urbanas e justiça social compensatória e pecuniária para evitar a mendicância civil de mulheres divorciadas abandonadas e não amparadas com proles famintas."],
          ["Tabelamento Naval Mercantil", "Disposições fixadas nos códigos civis governamentais definindo estritamente as amarrações nos preços nas margens portuárias para os comerciantes definindo tabelas diárias nas praças das locações impositivas das ágeis embarcações fluviais por volumetria de cargas proibindo extorsões e ganâncias sem controle e estipulando garantias na contratação dos tripulantes nos fretes de grande importância com sanções para danos e roubos nos cascos e nas margens, servindo como o primeiro manual legal oficial da justiça náutica comercial da antiguidade nos rios que banhavam todas as fronteiras nos sistemas burocráticos imperiais prósperos sob multas financeiras judiciais ou a perda sumária dos navios."],
          ["Tarifação Compulsória dos Artesãos e Médicos", "Estatuto imperial das normas fixas civis imposto pelas pranchetas das capitais da era que congelava a indexação na balança nos pagamentos dos contratos salariais estipulando que o dia suado no pó por pedreiros os ganhos dos oleiros ceramistas artífices estariam e seriam fixos nos limites diários em prata nos meses estabelecidos sem abusos nem barganhas visando as manutenções das estruturas do desenvolvimento e das obras arquitetônicas cívicas do reinado sem interrupções e sem revoltas de operários mal pagos nos salários, garantindo uma rede de ordem social em todos os distritos periféricos com a remuneração certa nas moedas e víveres diários estabelecidos nas pedras nos muros e monumentos legislativos das comarcas antigas sob sentenças para eventuais calotes ou infrações."],
          ["Corte das Mãos pela Responsabilidade Médica", "Punição de responsabilidade cirúrgica assustadora atestada legalmente pelas estelas punitivas com a pena corpórea sem perdão das chancelas caso nas aberturas graves ou sangrias arriscadas usando instrumentos metálicos não propiciassem curas gerando a fatalidade morte para escravos com restituições e na nobreza a mutilação violenta e extirpação em público nos átrios com as mãos e instrumentos cirúrgicos para o médico incompetente perante a corte punindo de forma espelhada a falta técnica da responsabilidade e curandeirismos mortais no império com terrorismo punitivo no corpo civil, extirpando licenças das guildas."],
          ["Morte do Filho do Construtor Culpado", "Cláusula macabra da culpa e punições transversas para as áreas urbanas na história cível da construção fixando norma drástica que perante um telhado inseguro ou pilar caindo, no soterramento mortífero nas vias das casas com danos no herdeiro da residência a sentenciada aplicação retributória espelhava cruelmente as vidas sem poupar a descendência recaindo as garras punitivas e execução direta as custas nas vidas do filho mais velho ou prole paralela idêntica do engenheiro e artesão negligente para saciar as perdas proporcionais exatas das justiças e leis impiedosas corporais da equidade absurda no entendimento retribuitivo extremo sem dó com atestações das assembleias dos sábios ou juízes sem misericórdia, num período severo de repressão criminal aos delitos com culpa no povo rústico do passado."],
          ["Perdão e Moratória Rural por Temporais", "Dispositivo previdenciário e legal das isenções humanitárias das cortes protegendo doações perante aos lavradores estipulando no código perdões absolutos dos impostos débitos juros não executando nos credores ou nos hipotecados a desgraça das masmorras suspendendo as exigibilidades de prata ou feixes quando o mau tempo nas safras destruíssem pelas secas nas barragens ou tempestades violentas todo ou partes das glebas colhidas na exação fiscal como socorro no ano judicial atípico impulsionando subsistências camponesas e impedindo extermínio e falência geral do operariado na máquina rural agrícola do governo nos milênios pretéritos da história antiga no território civil sob leis sábias, piedosas do monarca das leis agrárias perante crises ecológicas nos limites rurais."],
          ["Indenização Financeira pelo Boi Chifrador", "Normatização cível agrária engenhosa instituindo a teoria de acidentes previsíveis estatuindo punição reparatória perante desastres obrigando na cidade os donos avisados legalmente e notificados por vizinhos em audiência cujas rezes ou rebanhos furiosos furassem camponeses não lhes decepando na raiz nas aspas dos animais agressivos gerando óbitos, a honrar as sentenças e a cobrir compulsoriamente os sepultamentos pagando nos tribunais com pesados siclos nos tesouros familiares vitimados ressarcindo toda extensão da imprudência na ausência nas prevenções dos perigos nas aldeias e pastoreios daquele tempo para garantir paz social nas planícies agricultáveis e rebanhos da civilização."],
          ["Teto Legal e Alforria na Escravidão por Dívida", "Medida cautelar das clemências inseridas pelo redator da justiça antiga estipulando limites temporais humanitários de que se algum infeliz cidadão atolado não tivesse condições leiloando por força dos credores seu conjugue seus rebentos perante fiadores aos trabalhos forçados sem remuneração não perdessem liberdade perpétua na condição submissa, libertando-se os cativos endividados rigorosa e incontestavelmente nos jubileus restabelecidos após três laboriosos anos inteiros devolvendo lhes plenos gozos das autonomias de liberdade restabelecendo as propriedades originárias no lar cívico desfazendo sem maiores penas na praça o título possessório do opressor fiduciário na época estritamente material nas províncias de negócios mercantis nos primórdios no berço milenar social do legislador."],
          ["Naditu Empreendedoras", "Uma casta autônoma feminina e aristocrática eclesiástica privilegiada apartada na lei dos lares da família tradicional residindo em enclausuramentos seculares que por abstenções da gestação possuíam amparo nas assembleias detendo fortunas amplas na sua independência investindo no exterior capitais agindo corriqueiramente nas ruas como banqueiras credoras donas em feitorias compradoras e agentes rurais influentes não tolerando no conselho a submissão aos maridos atestando emancipação e lideranças empresariais nos pergaminhos e tribunais imobiliários dominando e comprando em massa as chancelas mercantis de rotas num mundo patriarcal rígido de dominância masculina nos códigos vigentes e regras opressoras normais para a grande massa feminina de sua era antiga nas fronteiras do norte ou sul imperial."],
          ["Karum dos Mercadores", "Instituição mercantil independente fora das fronteiras e muros de proteção da nação operando rotas de comboios nas serranias distantes gozando isenções e poder de lei na extraterritorialidade presidida em conselhos por grandes atacadistas exercendo sem amarras nas comarcas do rei a dupla missão bancária punitiva das fraudes e arbitragens perante os conflitos do transporte com multas nas cortes de comércio internacional que cobrava os contratos em caravanas de carregamentos asilo diplomático e faturamentos com regras estritas para garantir transações lucrativas intercâmbios e riquezas fluentes pacíficas sem litígios insolúveis sem as presenças do palácio central das leis nas praças e assentamentos de forasteiros e mercadores nos vales, mantendo justiça entre parceiros nos negócios remotos."],
          ["Mutilação das Mãos pela Agressão Paterna", "Ordem suprema disciplinar inflexível instituída nas penalidades extremas punindo sem perdões as revoltas filiais e a ingratidão intrafamiliar na qual a descendência perversa ou insolente perante aos testemunhos que perpetrasse com ódio golpes e dores em espancamento violento ou ultrajes corporais ferindo sem mortes genitores atestando sacrilégio familiar as cortes obrigariam sentenciando sem demoras nos tribunais com a pronta amputação nas tábuas e guilhotinas com decepamento violento punitivo perante as turbas punindo a mão culpada garantindo a obediência absoluta nos lares sob a proteção cega patriarcal dos impérios punindo nas mãos culpadas de sangue a transgressão irretratável das leis básicas e reverência no cotidiano civil do povo com penas brutais inalteráveis."],
          ["Morte Soterramento para Arrombamento Urbano", "Medida punitiva imediata bárbara e exemplar cominada especificamente nos casos dos gatunos rasteiros furtivos violadores assaltantes e ladrões nos guetos apenados e executados pelo populacho nas ruelas com sanções imediatas que caso surpreendidos fazendo cavidades nas paredes de adobes ou de barro e invadindo lares pelo breu da noite não seguiriam à corte mas pereceriam sufocados enterrados nas cumbucas da mesma alvenaria que destruíram numa morte atroz emparedados sem julgamento perante juízos do monarca servindo em definitivo aos curiosos o horror das lições sumárias nos crimes hediondos na criminalidade suburbana dos reinados da civilização antiga repressora sem defesa da integridade dos acusados confessos."],
          ["Morte Implacável no Fogo de Saqueadores de Incêndios", "Condenação sumaríssima de letalidade atroz para oportunistas em tragédias, onde a legislação não tolerando as misérias dos bandos estipulava que criminosos astutos que adentrando em residências nas chamas para oferecer supostos auxílios a família flagelada fossem pilhados usurpando o mobiliário salvo deveriam sem as protelações nos interrogatórios ser precipitados atirados e queimados pelo juiz da corte ou prefeitos aos pés das mesmas chamas purificadoras nas labaredas sem sepultamento em expiação capital as divindades pelas ignomínias imorais contra o povo desesperado e o pacto civil da paz no domínio das urbes organizadas punindo saqueadores em época de pânico e hecatombes naturais com crueldade letal perante justiças de multidões."],
          ["Execução por Afogamento Compulsório de Adultério Flagrante", "Determinação penal passional na lei cruel punindo sem trégua aos delitos da devassidão perante concubinas traidoras estipulando no julgamento ou fúria do próprio consorte flagrado nos leitos as execões obrigatórias conjuntas afogando sem defesa ambos acorrentados ou presos sendo lançados violentamente nas correntezas fluviais garantindo absolvições apenas se excepcionalmente na misericórdia improvável do ofendido marido se perdoasse abertamente nos processos a esposa mas cuja lei geral requeria morte dupla e expiação purificadora na natureza ao invés da fogueira ou chibatas atestando um domínio masculino opressor possessivo moral inquestionável nos códigos patriarcais de retribuição capital da civilização antiga punitiva em casos provados no estado submisso às honras intocáveis do patriarcado."],
          ["Guarda Tutelar de Aprendizado nos Contratos Familiares", "Avançadíssima previsão das diretrizes sociais civis e regulamentos nas proteções de acolhimentos legais estatuindo e vinculando os mestres ferreiros entalhadores e donos de corporações numa obrigatoriedade forçosa que ao registrarem nas pedras acolhendo infantes miseráveis abandonados no aprendizado e nos tetos ficariam sujeitos às auditorias nos conselhos e caso não transmitissem todas aptidões das artes e do labor produtivo a adoção fracassava devendo retornar à rua sem ressarcimento não permitindo servidões abusivas nas falsas escolas nas comarcas garantindo o ensino laboral estrito no império protegendo a base das forças ativas da nação e as profissões repassadas nas regras justas com sanções caso violadas nos acordos perante tribunais regionais de justiça."],
          ["Regulação Mortal das Tabernas por Mulheres", "Estatuto estrito e controlador imposto no código recaindo sobre as gerentes autônomas nos bares populares fornecedores das beberagens fermentadas estipulando proibições pesadas por motins políticos reuniões conspirações ou traições se organizassem em seus recintos e caso descobertas se escondessem ou acobertassem sediciosos golpistas amotinados nos porões sem as denúncias incontinentes e entregas as justiças do pátio a hospedeira das taças viria sentenciada com o fuzilamento capital as mortes expiatórias nas lâminas do império servindo em repressão às sublevações e garantia da coroa ditatorial atestando também restrição e policiamento rígido ao universo autônomo e de encontros não santificados das praças mundanas na antiga terra clássica controlada sob as ordens e fiscalizações severas com condenações à guilhotina da coroa absolutista sem negociação penal no Estado das províncias regionais"],
          ["Severidade do Repúdio Extremo ou Óbito contra Tabus Consanguíneos", "Normas drásticas familiares impostas nos tribunais pátrios vedando radicalmente contaminações dos sangue profanadores impondo as exclusões punições perpétuas sentenciando as expulsões as forcas e a fogueiras crematórias irrecorríveis das instâncias purificando as vergonhas íntimas se consumados parentescos proibidos no íntimo, como relações abomináveis provadas flagrantes com irmãos e filhas expiadas com a dor capital sem escapes e os banimentos absolutos no exílio aos laços atenuados e madrastas atestando controle ético biológico e severidade das varas punindo as infâmias no código da justiça estatal e controle sexual religioso de seu império com tradições patriarcais opressivas nas antigas sociedades"],
          ["Plenitude Sucessória das Servas e Filiações Adulterinas Reconhecidas", "Preceito permissivo nas tolerâncias das sucessões cíveis patrimoniais que asseguravam no direito material sem exclusões da herdeira primária em que as esposas submissas ou escravas geradoras das proles secundárias fossem alforriadas definitivamente aos passamentos mortuários do líder patriarca admitindo que, se chamados e reconhecidos com clareza nos tribunais em vida verbalmente ou em argila e selos pelo genitor e chefe dos bens perante testemunhos de cortes e conselhos as heranças seriam repartidas isonomicamente equiparando nas fatias todos filhos naturais com garantias e quotas da justiça da civilização antiga sem opressão filial ou disputas litígios nas sentenças em apelação contra herdeiros secundários da linhagem mista no passado"],
          ["Leis Impiedosas das Terras Médias Nortenhas (Assíria)", "Uma formidável coleção bárbara, violenta das punições penais de um império formidavelmente militar infame por ser incrivelmente sádica implacável extremada farta em açoites estupros penais torturas inomináveis castrações nas normatizações opressoras cruéis aos escravizados as conquistas impondo submissão amedrontadora as mulheres em grau nunca visto as quais restavam propriedades dos lares escravizadas na moral da corte destituídas dos ganhos em leis machistas opressivas garantindo obediência civil pela espada e pela mutilação legal nas sentenças das províncias da nação beligerante com punições drásticas e impiedosas em recintos sem a clemência do código das épocas antigas nos reinados orientais do primeiro império de violência irrestrita dos conquistadores do pólo de dominação do mundo antigo das cidades muradas."],
          ["Mutilação Facial Judicial Punitiva e Olho por Olho Ocular", "Aplicabilidade da justiça através chibatas cruéis arrancamentos e decepamento brutal sistemático onde infrações penais ou mesmo faltas em testemunho resultavam aos transgressores nas lâminas quentes e no cepo e cortes dilacerantes nos lábios narizes rasgados nos veredictos ou dedos perante todos na feira para que as atrocidades cometidas pelas marcas deformantes eternas ficassem como crachá expiatório inibitório para futuros usurpadores da ordem pública das comarcas aterrorizando nações cativas sem tolerar insurreições, estupradores e corrupções institucionais a mando de imperadores militaristas sem remorso nos massacres no oriente arcaico sob leis de crueldade de sangue para pacificação pelas chamas das execuções bárbaras nos pátios das urbes dominadas pelas falanges de juízes dos reinados sangrentos antigamente."],
          ["Obrigatoriedade e Privilégio Social do Véu Feminino", "Instituição mandamental da pureza na sociedade da época com penas ditadas as classes exigindo formalmente na via pública a vedação cobertura velamento obrigatório dos ombros testas bocas das figuras puritanas castas esposas plenas viúvas senhoras da nobreza sinalizando aos pervertidos as superioridades atestando o não incômodo inviolável e blindagem da reputação sob pena e multas nas quebras, um símbolo imposto as cativas das cidades como código de submissão casta opressivo na era e que demarcava as distâncias das castas respeitáveis na lei perante os cortes e juízes que castigavam no império das tradições militares nos domínios vastos do norte asiático sob jugo patriarcal imposto as famílias sob ameaça real da coroa imperial nos tempos remotos antigos."],
          ["Proibição do Véu para Prostitutas e Escravas Falsárias", "A repressão simétrica nas transgressões sumárias com espancamento violentíssimo público quinhentas bordoadas castigos nos queixumes de óleo ou pixe derramados para a servil escrava libertina prisioneira que audaciosamente se atrevesse em transgressão disfarçar a condição rebaixada utilizando vestes adereços dos véus cobrindo crânio enganando os oficiais, sendo o adereço banido no código penal visando atestar perante os vigias cívicos expurgo e demarcação nas fileiras de quem não era nobre nos patamares dos reinados e do Estado puritano e guerreiro mantendo castas e aparências com brutalidade judicial e penas punitivas para controle severo da sociedade das antigas muralhas no norte do golfo em sua época obscura sem isonomia nas praças nos fóruns."],
          ["Tratados Internacionais de Vassalagem Abominável e Terror", "Avançadíssimo formato extorsionário dos contratos bélicos da chancelaria onde imperadores expansionistas impunham alianças sangrentas escravizantes firmadas por maldições juramentos assombrosos descrevendo minuciosamente nos rolos profecias nas quais rebeliões sedições faltas dos pagamentos em ouros anuais e provisões iriam garantir pragas divinas empalamentos de massa, violências e o esmagamento implacável da cidade estado perdedora subjugada para aniquilar as confederações em alianças inquebrantáveis de guerra na dominação geopolítica diplomática do pavor militar e jurídico das regiões férteis da crescente terra dos impérios expansionistas na história com documentos originais impositivos aos povos subalternos escravizados nas eras pregressas dos primeiros e vastos generais e seus reinados ditatoriais com imposições legais extorsivas ao sul no continente vizinho ao longo de vales distantes"],
          ["Éditos Cívicos de Remissão de Dívidas (Misharum)", "Pausas econômicas extraordinárias, tábua rasa e anistias nos decretos governamentais das justiças que eram lançados nas inaugurações cerimoniais no trono recém assumido onde monarcas rasgavam débitos de camponeses libertavam sem custas reféns de dívidas destruindo registros fiduciários dos agiotas e quebrando argilas contábeis impedindo concentração bancária nos templos permitindo reinício econômico nas classes baixas aliviando extermínio falimentar dos súditos para sustento de sua coroa com a benesse civil do estado nas esferas de litígios rurais de juros e multas anuladas como perdão divino e proteção social legalmente instituída como propaganda do poder reinante das leis justas de proteção da equidade nos vales e impérios antigos nas revoluções de juros abusivos das praças do estado das nações submissas e suas capitais nos períodos cíclicos das dinastias imperiais"],
          ["Feudos Militares Inalienáveis e Ilkum", "Territórios agrícolas provisões estatais inegociáveis doadas aos guerreiros, um modelo originário feudal nas províncias distribuídas em troca ininterrupta aos braços armados pela obrigação do sangue do alistamento estipulando defesas do muro, que de forma absoluta proibia as transações negociais imobiliárias para bancos e dívidas para proteção garantida da milícia e suas fontes perante agiotas das capitais mantendo o império sustentado belicamente e juridicamente assegurado pela lei nas proibições cíveis com regras que blindavam bens estatais essenciais nos tribunais contra apelações em penhoras nas cobranças e alienações dos foros judiciários protegendo soldados dos endividamentos no sistema legal de impérios militaristas sob legislações da guerra e ordem no mundo de litígios na proteção camponesa nas regiões pacíficas ou submissas do passado guerreiro com ordenamento perfeito da coroa e exército garantidos nos domínios"],
          ["Redum e Bairum Privilégios da Base Castrense", "Atestados legais de categoria especial nas guardas blindando e isentando em audiência todos as propriedades os pequenos infantes recrutados tropas de soldados rasos contra as covardes pilhagens nos rebanhos raptos, abusos apropriações indébitas praticadas nos butins de campanha por magistrados e coronéis superiores, cuja denúncia acarretaria nas decapitações executivas perante o rei sem piedade nos pátios caso comprovadas violações aos pertences dos defensores do império no período punitivo, promovendo disciplina bélica moral de classe intocável nas comarcas rurais garantindo as patentes sem exploração na hierarquia inferior sob supervisão em fórum perante escrivães da nação com justiças severas do código nos tribunais imperiais centralizados nas capitais para justiças aos subordinados ofendidos e malogrados perante opressores fardados nas linhas guerreiras de época em punições implacáveis das varas dos conselhos militares"],
          ["Punibilidade Aquática por Feitiçarias e Calúnias Obscuras", "Previsões litúrgicas inescrupulosas sem defesas materiais ou testemunhos perante crimes onde provas falham decretando aos mágicos lançadores de preces maldições ocultas envenenamentos suspeitos submetê los a prova definitiva fatal atirando o sentenciado amarrado para sobrevivência mágica nos braços tempestuosos do Eufrates validando absolvição improvável e provando culpas se as lamas soterrarem nos leitos perante deuses dos rios do estado imperial nas justiças sem trâmites e recursos baseada no pensamento punitivo arcaico religioso em sentenças cruéis sem instâncias de apelações no rito ordinário nas margens perante clero em vilas supersticiosas no passado na proteção cívica contra curandeiros perigosos julgados sumariamente ao afogamento perante as nações regionais nas lendas punitivas passadas em milênios da ignorância penal punitiva nas culturas extintas de opressão na lei dos deuses de sua civilização remota sem provas irrefutáveis exigidas para os julgamentos dos fóruns e prefeitos antigos nas regiões do norte longínquo das areias nas praças e varas primitivas rurais e templárias da história humana"],

        ];

        // Geração do array de perguntas bruto
        const RAW_QUESTIONS = [];
        for (let i = 0; i < 50; i++) {
            RAW_QUESTIONS.push({ term: ROMAN[i][0], text: ROMAN[i][1], answer: "Romano" });
            RAW_QUESTIONS.push({ term: GREEK[i][0], text: GREEK[i][1], answer: "Grego" });
            RAW_QUESTIONS.push({ term: EGYPT[i][0], text: EGYPT[i][1], answer: "Egípcio" });
            RAW_QUESTIONS.push({ term: MESO[i][0], text: MESO[i][1], answer: "Mesopotâmico" });
        }

        // Embaralhamento seguro
        const shuffleArray = (array) => {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        };

        const FLAGS = {
            'Romano': '🇮🇹',
            'Grego': '🇬🇷',
            'Egípcio': '🇪🇬',
            'Mesopotâmico': '🇮🇶'
        };

        // ==========================================
        // ESTADO GLOBAL DO JOGO (STATE)
        // ==========================================
        let gameState = 'setup'; // 'setup', 'playing', 'gameover'
        let numPlayersInput = 2;
        let playerNames = ['Jogador 1', 'Jogador 2'];
        let players = [];
        let questionsMap = {};
        let availableNumbers = [];
        let currentPlayerIndex = 0;
        let showPapyrusInput = false;
        let numberInputVal = '';
        let currentQuestion = null;
        let feedback = null;

        // ==========================================
        // FUNÇÕES DE LÓGICA E INTERATIVIDADE
        // ==========================================

        // Sincroniza o array de nomes com os inputs em tempo real
        function savePlayerNamesFromDOM() {
            for (let i = 0; i < numPlayersInput; i++) {
                const input = document.getElementById(`name-${i}`);
                if (input) playerNames[i] = input.value;
            }
        }

        function handleNumPlayersChange(val) {
            savePlayerNamesFromDOM(); // Salva antes de recriar

            let parsedVal = parseInt(val);
            if (isNaN(parsedVal) || parsedVal < 1) parsedVal = 1;
            if (parsedVal > 15) parsedVal = 15;
            numPlayersInput = parsedVal;

            while (playerNames.length < numPlayersInput) {
                playerNames.push(`Jogador ${playerNames.length + 1}`);
            }
            playerNames = playerNames.slice(0, numPlayersInput);
            render();
        }

        function startGame() {
            savePlayerNamesFromDOM();

            players = playerNames.map((name, i) => ({
                id: i,
                name: name || `Jogador ${i + 1}`,
                isOut: false
            }));
            currentPlayerIndex = 0;

            const shuffled = shuffleArray(RAW_QUESTIONS);
            questionsMap = {};
            availableNumbers = [];
            
            shuffled.forEach((q, idx) => {
                const questionId = idx + 1;
                questionsMap[questionId] = { ...q, id: questionId };
                availableNumbers.push(questionId);
            });
            
            gameState = 'playing';
            render();
        }

        function handlePapyrusClick() {
            if (feedback || currentQuestion) return;
            showPapyrusInput = true;
            numberInputVal = '';
            render();
            // Focar automaticamente no input
            setTimeout(() => {
                const numInput = document.getElementById('papyrusNumber');
                if(numInput) numInput.focus();
            }, 50);
        }

        function closePapyrusModal() {
            showPapyrusInput = false;
            render();
        }

        function submitNumber(e) {
            e.preventDefault();
            const inputEl = document.getElementById('papyrusNumber');
            const num = parseInt(inputEl.value);
            
            if (isNaN(num) || num < 1 || num > 200) {
                alert("Por favor, digite um número entre 1 e 200.");
                return;
            }
            
            if (!availableNumbers.includes(num)) {
                alert("Este pergaminho já foi lido ou não existe! Tente outro número.");
                inputEl.value = '';
                return;
            }

            // Aceitou
            showPapyrusInput = false;
            availableNumbers = availableNumbers.filter(n => n !== num);
            currentQuestion = questionsMap[num];
            render();
        }

        function answerQuestion(answerOption) {
            if (feedback) return; // Previne múltiplos cliques
            
            const isCorrect = answerOption === currentQuestion.answer;
            const currentActivePlayers = players.filter(p => !p.isOut);
            const currentPlayer = players[currentPlayerIndex];
            
            if (isCorrect) {
                if (currentActivePlayers.length === 1 && players.length > 1) {
                    feedback = { status: 'correct', correctA: currentQuestion.answer, isVictory: true };
                } else {
                    feedback = { status: 'correct', correctA: currentQuestion.answer };
                }
            } else {
                const activeAfterThis = currentActivePlayers.filter(p => p.id !== currentPlayer.id);
                const isTie = activeAfterThis.length === 0;

                feedback = { status: 'wrong', correctA: currentQuestion.answer, isTie: isTie };

                players = players.map((p, i) => 
                    i === currentPlayerIndex ? { ...p, isOut: true } : p
                );
            }
            render();
        }

        function nextTurn() {
            if (feedback.isVictory) {
                gameState = 'gameover';
                feedback = null;
                currentQuestion = null;
                render();
                return;
            }

            if (feedback.isTie) {
                players = players.map(p => ({...p, isOut: false}));
                currentPlayerIndex = 0;
                feedback = null;
                currentQuestion = null;
                render();
                return;
            }

            // Próximo Jogador
            let nextIdx = (currentPlayerIndex + 1) % players.length;
            while (players[nextIdx].isOut) {
                nextIdx = (nextIdx + 1) % players.length;
            }
            
            currentPlayerIndex = nextIdx;
            feedback = null;
            currentQuestion = null;

            if (availableNumbers.length === 0) {
                gameState = 'gameover';
            }
            render();
        }

        function restartGame() {
            gameState = 'setup';
            currentQuestion = null;
            feedback = null;
            render();
        }

        // ==========================================

        // ==========================================

        function render() {
            const root = document.getElementById('root');
            
            if (gameState === 'setup') {
                root.innerHTML = renderSetup();
            } else if (gameState === 'playing') {
                root.innerHTML = renderPlaying();
            } else if (gameState === 'gameover') {
                root.innerHTML = renderGameOver();
            }

            // Inicializa os ícones do Lucide após recarregar o HTML
            lucide.createIcons();
        }

        function renderSetup() {
            let inputsHTML = '';
            for (let i = 0; i < numPlayersInput; i++) {

            return `

                                    type="number" 
                                    min="1" max="15"

        function renderPlaying() {
            const activePlayers = players.filter(p => !p.isOut);

                        feedbackInnerHTML = `
                            <div class="flex justify-center items-center space-x-3 mb-2">
                                <i data-lucide="x-circle" class="w-10 h-10 text-red-600"></i>
                                <h4 class="text-4xl md:text-5xl font-black text-red-700 uppercase tracking-widest">ERRADO!</h4>
                            </div>
                            <p class="text-xl text-[#8b5a2b] font-semibold mt-6">A invenção correta era:</p>
                            <p class="text-3xl md:text-4xl text-[#3e2723] font-bold mb-2 uppercase">${currentQuestion.term}</p>
                            <p class="text-lg text-[#8b5a2b] font-bold mb-6">(Direito ${feedback.correctA})</p>
                            ${feedback.isTie 
                                ? `<div class="px-4 py-4 bg-red-200 border-2 border-red-500 rounded-lg shadow-inner"><p class="text-lg text-red-900 font-bold leading-tight uppercase">Ninguém sobreviveu! ⚔️<br/><br/>TEMOS UM EMPATE!<br/>Todos ganham uma nova chance!</p></div>`
                                : `<div class="bg-red-100 border border-red-400 p-4 rounded-lg"><p class="text-xl text-red-900 font-bold">${currentPlayer.name} foi eliminado das areias do tempo!</p></div>`
                            }
                        `;
                    }

                    mainContentHTML += `
                        <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm p-4 animate-fade-in overflow-y-auto">
                            <div class="bg-[#e8d5a5] border-8 border-[#8b5a2b] p-6 md:p-12 rounded-2xl shadow-2xl text-center max-w-xl w-full animate-zoom-in my-auto">
                                <div class="flex justify-center mb-4">
                                    <span class="text-7xl drop-shadow-lg">${FLAGS[feedback.correctA]}</span>
                                </div>
                                ${feedbackInnerHTML}
                                <button onclick="nextTurn()" class="mt-8 mx-auto flex items-center justify-center space-x-2 bg-[#8b5a2b] hover:bg-[#6e4620] text-[#e8d5a5] px-8 py-4 rounded-full font-bold text-xl transition-transform hover:scale-105 shadow-lg w-full">
                                    <span>${feedback.isVictory ? 'Ver Resultado Final' : 'Avançar Turno'}</span>
                                    <i data-lucide="chevron-right" class="w-6 h-6"></i>
                                </button>
                            </div>
                        </div>
                    `;
                }
            }

            return `
                <div class="min-h-screen flex flex-col md:flex-row">
                    <!-- MURAL SIDEBAR -->
                    <div class="w-full md:w-72 bg-stone-800 border-b md:border-b-0 md:border-r border-amber-900 flex flex-col shadow-2xl z-10 max-h-48 md:max-h-screen overflow-hidden">
                        <div class="p-4 bg-stone-900 border-b border-amber-900 flex items-center justify-between space-x-2 shrink-0">
                            <div class="flex items-center space-x-2">
                                <i data-lucide="users" class="text-amber-500"></i>
                                <h2 class="text-xl font-bold text-amber-500 uppercase tracking-wider">O Mural</h2>
                            </div>
                            <span class="md:hidden text-amber-700 text-sm font-bold bg-amber-900/20 px-2 py-1 rounded">Rolagem ▸</span>
                        </div>
                        
                        <div class="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-thin scrollbar-thumb-stone-600">
                            <div>
                                <h3 class="text-xs text-stone-500 uppercase tracking-widest mb-2 font-bold">Ainda no Jogo (${activePlayers.length})</h3>
                                <ul class="space-y-2">
                                    ${activeListHTML}
                                </ul>
                            </div>
                            ${eliminatedListHTML}
                        </div>
                    </div>

                    <!-- ÁREA PRINCIPAL -->
                    <div class="flex-1 flex flex-col items-center justify-center p-6 relative h-[calc(100vh-12rem)] md:h-screen overflow-y-auto">
                        <!-- CABEÇALHO DO TURNO -->
                        <div class="absolute top-6 w-full text-center px-4">
                            <p class="text-stone-400 text-sm uppercase tracking-widest mb-1">Turno de</p>
                            <h2 class="text-3xl font-bold text-amber-400 truncate px-4">${currentPlayer.name}</h2>
                            <p class="text-stone-500 mt-2 text-sm">${availableNumbers.length} Invenções restantes</p>
                        </div>

                        <!-- PAPIRO GIGANTE OU QUESTÃO -->
                        <div class="mt-20 w-full max-w-3xl">
                            ${mainContentHTML}
                        </div>
                    </div>
                </div>
            `;
        }

        function renderGameOver() {
            const winners = players.filter(p => !p.isOut);
            
            let resultHTML = '';
            if (winners.length === 1) {
                resultHTML = `
                    <p class="text-xl mb-2 text-stone-300">O grande jurista supremo é:</p>
                    <p class="text-3xl font-bold text-yellow-400 uppercase tracking-wider">${winners[0].name}</p>
                `;
            } else if (winners.length > 1) {
                resultHTML = `
                    <p class="text-xl mb-2 text-stone-300">Os pergaminhos acabaram! Houve um empate entre:</p>
                    <div class="text-2xl font-bold text-yellow-400 space-y-2">
                        ${winners.map(w => `<div>${w.name}</div>`).join('')}
                    </div>
                `;
            } else {
                resultHTML = `
                    <i data-lucide="skull" class="w-16 h-16 text-stone-500 mx-auto mb-4"></i>
                    <p class="text-xl text-stone-300">Todos foram derrotados pelas areias do tempo.</p>
                `;
            }

            return `
                <div class="min-h-screen bg-stone-900 flex items-center justify-center p-4 font-serif text-stone-200">
                    <div class="bg-stone-800 border border-amber-500 p-8 rounded-xl shadow-2xl max-w-md w-full text-center animate-zoom-in">
                        <i data-lucide="crown" class="w-20 h-20 text-yellow-500 mx-auto mb-4"></i>
                        <h2 class="text-4xl font-bold text-amber-500 mb-6">FIM DE JOGO</h2>
                        
                        <div>${resultHTML}</div>

                        <button 
                            onclick="restartGame()"
                            class="mt-10 bg-amber-700 hover:bg-amber-600 px-6 py-3 rounded text-white font-bold transition w-full"
                        >
                            Jogar Novamente
                        </button>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // INICIALIZAÇÃO
        // ==========================================
        render();

    </script>
</body>
</html>
